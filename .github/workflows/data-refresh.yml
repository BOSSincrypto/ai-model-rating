name: Data Refresh

on:
  schedule:
    # Every Monday at 03:00 UTC
    - cron: '0 3 * * 1'
  workflow_dispatch:

concurrency:
  group: data-refresh
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20

      - name: Run fetch-sources.mjs
        id: fetch
        run: |
          node scripts/fetch-sources.mjs
          echo "snapshot_date=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Create branch and commit
        id: branch
        run: |
          BRANCH="data/auto-${{ steps.fetch.outputs.snapshot_date }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add data/models.json data/history/
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore(data): refresh rankings ${{ steps.fetch.outputs.snapshot_date }}"
            git push origin "$BRANCH" --force
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.branch.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SNAPSHOT_DATE="${{ steps.fetch.outputs.snapshot_date }}"
          BRANCH="${{ steps.branch.outputs.branch }}"
          # Write body to a temp file to avoid YAML multi-line quoting issues
          cat > /tmp/pr-body.md <<-EOF
          Automated weekly data refresh from public LLM leaderboard sources.

          This PR updates:
          - \`data/models.json\` (current snapshot)
          - \`data/history/${SNAPSHOT_DATE}.json\` (history snapshot)

          Generated by the \`data-refresh.yml\` workflow.
          EOF
          gh pr create \
            --repo ${{ github.repository }} \
            --base main \
            --head "$BRANCH" \
            --title "chore(data): refresh rankings ${SNAPSHOT_DATE}" \
            --body-file /tmp/pr-body.md
