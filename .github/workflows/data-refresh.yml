name: Data Refresh

on:
  schedule:
    # Every Monday at 03:00 UTC
    - cron: '0 3 * * 1'
  workflow_dispatch:

concurrency:
  group: data-refresh
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20

      - name: Run fetch-sources.mjs
        run: node scripts/fetch-sources.mjs

      - name: Create Pull Request if data changed
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(data): refresh rankings"
          branch: data/auto-refresh
          delete-branch: true
          title: "chore(data): refresh rankings"
          body: |
            Automated weekly data refresh from public LLM leaderboard sources.
            
            This PR updates:
            - `data/models.json` (current snapshot)
            - `data/history/` (latest weekly snapshot)
            
            Generated by the `data-refresh.yml` workflow.
