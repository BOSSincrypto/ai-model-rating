name: Data Refresh

on:
  schedule:
    # Every Monday at 03:00 UTC
    - cron: '0 3 * * 1'
  workflow_dispatch:

concurrency:
  group: data-refresh
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20

      - name: Run fetch-sources.mjs
        id: fetch
        run: |
          node scripts/fetch-sources.mjs
          echo "snapshot_date=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Check for changes
        id: changes
        run: |
          # Check for tracked file changes and new untracked files
          if git diff --quiet data/models.json data/history/ 2>/dev/null && \
             [ -z "$(git status --porcelain data/models.json data/history/)" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No data changes detected."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Data changes detected."
            git status --short data/models.json data/history/
          fi

      - name: Create branch and commit changes
        if: steps.changes.outputs.changed == 'true'
        id: create-branch
        run: |
          BRANCH="data/auto-${{ steps.fetch.outputs.snapshot_date }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add data/models.json data/history/
          git commit -m "chore(data): refresh rankings ${{ steps.fetch.outputs.snapshot_date }}"
          git push origin "$BRANCH"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        with:
          script: |
            const branch = '${{ steps.create-branch.outputs.branch }}';
            const snapshotDate = '${{ steps.fetch.outputs.snapshot_date }}';
            const result = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `chore(data): refresh rankings ${snapshotDate}`,
              head: branch,
              base: 'main',
              body: 'Automated weekly data refresh from public LLM leaderboard sources.\n\nThis PR updates:\n- `data/models.json` (current snapshot)\n- `data/history/' + snapshotDate + '.json` (history snapshot)\n\nGenerated by the `data-refresh.yml` workflow.',
            });
            console.log('PR created:', result.data.html_url);
